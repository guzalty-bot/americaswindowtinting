<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact America's Window Tinting &amp; Graphics</title>
    <link rel="icon" type="image/png" href="../images/Icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Oswald:wght@400;500;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script>
document.addEventListener('DOMContentLoaded', function() {
  const menuToggle = document.querySelector('.menu-toggle');
  const mainNav = document.querySelector('.main-nav');
  
  menuToggle.addEventListener('click', function() {
    menuToggle.classList.toggle('active');
    mainNav.classList.toggle('active');
  });
  
  // Close Menu
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      menuToggle.classList.remove('active');
      mainNav.classList.remove('active');
    });
  });
});
</script>
</head>
    
<body>
  <header class="top-bar">
    <div class="logo-wrap">
      <a href="../index.html">
        <img src="../images/Hermiston%20Logo.png" alt="America's Window Tinting & Graphics" class="logo">
      </a>
    </div>

      <button class="menu-toggle" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
      
    <nav class="main-nav">
      <a href="../index.html">Home</a>
      <a href="../html/Services.html" class="active">Services</a>
      <a href="../html/gallery.html">Gallery</a>
      <a href="../html/contact.html">Contact</a>
    </nav>
  </header>
    
    <main class="page-content">
    <section class="page-intro">
      <h1 class="services-title">Get your free quote today</h1>
      <p class="page-subtitle"></p>
    </section>

    <div class="contact-layout">
      <!-- Información de contacto -->
        <div class="contact-left">
      <div class="contact-info">
        <div class="contact-box">
          <h3 class="contact-icon"></h3>
           <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!4v1775535931685!6m8!1m7!1suCncRRI95Kk_Z4vdKyqx1w!2m2!1d45.87000139262577!2d-119.2925991085257!3f81.20863!4f0!5f0.7820865974627469" width="600" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div> 
            
            <div class="contact-box">
          <h2>Visit Us</h2>
           
          <p>80553 N. Hwy 395<br>Hermiston, OR 97838</p>
                </div>
        </div>
          
           <div class="contact-box">
          <h3 class="contact-icon"></h3>
          <h2>Call Us</h2>
          <p>(541) 571-6284</p>
        </div>

        <div class="contact-box">
          <h3 class="contact-icon"></h3>
          <h2>Email</h2>
          <p>americaswindowtint@gmail.com</p>
        </div>
      </div>
</div>
      <!-- Formulario -->
      <div class="contact-form-container">
        <div class="form-header">
          <h2>Complete the form</h2>
        
        </div>

          <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
    
          <div class="form-group">
            <input type="text" name="name" placeholder="Full Name" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <input type="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
              <input type="tel" name="phone" placeholder="Phone Number">
            </div>
          </div>


          <div class="form-group">
            <textarea name="message" placeholder="Tell us about your project..." rows="5" required></textarea>
          </div>

          <button type="submit" class="form-btn">Send Message</button>
        </form>
      </div>
    </div>
  </main>
  <footer class="site-footer">
    <div class="footer-inner">
        <p>© 2026  America's Window Tinting &amp; Graphics</p>
        <div class="footer-social">
        <a href="https://www.facebook.com/americas.window.tint/" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        </div>
      </div>
    </footer>
    
</body>
</html>
